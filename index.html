<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="/assets/css/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Results summary component</title>

</head>

<body>
  <main class="container">

    <section class="your-result">

      <h1 class="title">Your Result</h1>
      <div class="darkest-circle">
        <p class="result-value">76</p>
        <p class="max-value">of 100</p>
      </div>

      <h2 class="result-title">Great</h2>
      <p class="results-description">You scored higher than 65% of the people who have taken these tests.</p>
    </section>

    <section class="summary">

      <h1 class="title">Summary</h1>

      <div class="item reaction">Reaction <strong>80 / 100</strong></div>

      <div class="item memory">Memory <strong>92 / 100</strong></div>

      <div class="item verbal">Verbal <strong>61 / 100</strong></div>

      <div class="item visual">Visual <strong>72 / 100</strong></div>

      <button type="submit" class="btn-continue"> Continue </button>
    </section>


  </main>
  <div class="footer">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Khaled Silva</a>.
  </div>
</body>

</html>
