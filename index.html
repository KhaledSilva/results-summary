<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./assets/css/reset.css">
  <link rel="stylesheet" href="./assets/css/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Frontend Mentor | Results summary component</title>

</head>

<body>
  <main class="container">

    <section class="your-result">

      <h1 class="your-result-title">Your Result</h1>
      <div class="darkest-circle">
        <p class="result-value">76</p>
        <p class="max-value">of 100</p>
      </div>

      <h2 class="result-title">Great</h2>
      <p class="results-description">You scored higher than 65% of the people who have taken these tests.</p>
    </section>

    <section class="summary">

      <h1 class="summary-title">Summary</h1>

      <div class="itens">

        <div class="item reaction">
          <div class="left">
          <img src="./assets/images/icon-reaction.svg" alt="imagem de um raio">
          Reaction
          </div> 
          <p><span>80</span> / 100</p>
        </div>

        <div class="item memory">
          <div class="left">
            <img src="./assets/images/icon-memory.svg" alt="imagem de um cerebro">
            Memory
          </div>
           <p><span>92</span> / 100</p>
        </div>

        <div class="item verbal">
          <div class="left">
            <img src="./assets/images/icon-verbal.svg" alt="imagem de um balão de conversa">
            Verbal 
          </div>
          <p><span>61</span> / 100</p>
        </div>

        <div class="item visual">
          <div class="left">
            <img src="./assets/images/icon-visual.svg" alt="imagem de um olho">
            Visual
          </div>
          <p><span>73</span> / 100</p>
        </div>

      </div>
        
      <button type="button" class="btn-continue"> Continue </button>
      </section>


  </main>
  <div class="footer">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Khaled Silva</a>.
  </div>
</body>

</html>
